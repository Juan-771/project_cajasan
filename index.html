<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Facturación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">
<button onclick="ejecutarPython()">Buscar</button>
<div class="container">
    <h1> Sistema de Facturación</h1>

    <div class="controls">
        <input type="text" id="buscador" placeholder="Buscar empresa..." onkeyup="filtrar()">
        <button onclick="ejecutarPython()">Actualizar</button>
        <button onclick="descargarExcel()"> Descargar Excel</button>
    </div>

    <h2>Total General: $<span id="totalGeneral">0</span></h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Empresa</th>
                <th>NIT</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Ciudad</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>


<script src="script.js"></script>
</body>
</html>
